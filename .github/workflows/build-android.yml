name: Build Mobile Apps & Deploy Web

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/
          cp songs_array.js www/
          cp -r assets www/ || true
          cp manifest.json www/ || true
          cp sw.js www/ || true

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android App (Debug & Release APKs)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Upload Compiled APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk

  ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/
          cp songs_array.js www/
          cp -r assets www/ || true
          cp manifest.json www/ || true
          cp sw.js www/ || true

      - name: Initialize iOS Platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS App (Unsigned Xcode Build)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos clean build

      - name: Compress iOS App Bundle
        run: |
          cd ios/App/build/Release-iphoneos
          zip -r App.zip App.app

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: ios/App/build/Release-iphoneos/App.zip

  deploy-web:
    name: Deploy Web to GitHub Pages
    needs: android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Android APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: android-apks

      - name: Build Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/
          cp songs_array.js www/
          cp -r assets www/ || true
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp android-apks/app-debug.apk www/app-release.apk || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: www
          branch: gh-pages
